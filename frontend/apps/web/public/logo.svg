<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="10" fill="url(#g)"/>
  <!-- Candlestick 1 (short red/down) -->
  <line x1="13" y1="12" x2="13" y2="36" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="10" y="18" width="6" height="10" rx="1" fill="white"/>
  <!-- Candlestick 2 (tall green/up) -->
  <line x1="24" y1="8" x2="24" y2="38" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="21" y="12" width="6" height="16" rx="1" fill="white" fill-opacity="0.85"/>
  <!-- Candlestick 3 (medium) -->
  <line x1="35" y1="14" x2="35" y2="34" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="32" y="20" width="6" height="8" rx="1" fill="white"/>
</svg>
